<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>陽明交通大學 E3 數位學習平台</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Microsoft JhengHei", "Arial", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top Header Bar ── */
    .top-bar {
      background: #003865;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 24px;
      height: 64px;
      gap: 16px;
    }
    .top-bar .site-title {
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .top-bar .sub-title {
      font-size: 13px;
      opacity: 0.85;
      margin-top: 2px;
    }

    /* ── Banner strip ── */
    .banner {
      background: linear-gradient(135deg, #003865 0%, #005ea6 60%, #0080c6 100%);
      height: 8px;
    }

    /* ── Main content area ── */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }

    .card-header {
      background: #003865;
      color: #fff;
      padding: 20px 28px 16px;
    }
    .card-header h2 {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 2px;
    }
    .card-header p {
      font-size: 12px;
      opacity: 0.8;
    }

    .card-body {
      padding: 28px 28px 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      color: #444;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      transition: border-color 0.2s;
      outline: none;
    }
    .form-group input:focus {
      border-color: #003865;
      box-shadow: 0 0 0 3px rgba(0,56,101,0.12);
    }

    .hint {
      font-size: 11.5px;
      color: #888;
      margin-top: 4px;
    }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: #003865;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }
    .btn-login:hover {
      background: #005ea6;
    }

    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 20px 0;
    }

    .links {
      display: flex;
      justify-content: space-between;
      font-size: 12.5px;
    }
    .links a {
      color: #003865;
      text-decoration: none;
    }
    .links a:hover {
      text-decoration: underline;
    }

    /* ── Footer ── */
    footer {
      background: #333;
      color: #aaa;
      text-align: center;
      font-size: 12px;
      padding: 14px;
    }
    footer a { color: #ccc; text-decoration: none; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="top-bar">
    <div>
      <div class="site-title">國立陽明交通大學 E3 數位學習平台</div>
      <div class="sub-title">National Yang Ming Chiao Tung University &nbsp;·&nbsp; E3 e-Learning Platform</div>
    </div>
  </div>
  <div class="banner"></div>

  <!-- Login Card -->
  <div class="main">
    <div class="card">
      <div class="card-header">
        <h2>帳號登入 &nbsp;/&nbsp; Sign In</h2>
        <p>請使用您的校園帳號與密碼登入 &nbsp;·&nbsp; Use your campus account to log in</p>
      </div>
      <div class="card-body">
        <form method="POST" action="/login">
          <div class="form-group">
            <label for="username">帳號 / Username</label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="學號或教職員編號"
              autocomplete="username"
              required
            />
            <div class="hint">例：student ID / faculty ID</div>
          </div>
          <div class="form-group">
            <label for="password">密碼 / Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="請輸入密碼"
              autocomplete="current-password"
              required
            />
          </div>
          <button type="submit" class="btn-login">登入 / Login</button>
        </form>

        <hr class="divider" />

        <div class="links">
          <a href="#">忘記密碼？</a>
          <a href="#">校務資訊系統</a>
          <a href="#">聯絡資訊組</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    &copy; 2024 國立陽明交通大學 計算機與網路中心 &nbsp;|&nbsp;
    <a href="#">隱私政策</a> &nbsp;|&nbsp;
    <a href="#">使用條款</a>
  </footer>

</body>
</html>
