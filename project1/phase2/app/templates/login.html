{% extends "base.html" %}
{% block title %}Sign in — Phase 2{% endblock %}

{% block content %}
<h1>Sign in</h1>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="post" action="/login">
  <label for="username">Username</label>
  <input id="username" name="username" type="text"
         placeholder="Your username" required autofocus autocomplete="username">

  <label for="password">Password</label>
  <input id="password" name="password" type="password"
         placeholder="Your password" required autocomplete="current-password">

  <label for="totp_code">Authenticator code</label>
  <input id="totp_code" name="totp_code" type="text"
         placeholder="6-digit code from your app"
         maxlength="6" inputmode="numeric"
         pattern="[0-9]{6}" autocomplete="one-time-code" required>

  <button class="btn" type="submit">Sign in</button>
</form>

<a class="link" href="/register">No account yet? Register</a>
{% endblock %}
