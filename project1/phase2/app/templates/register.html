{% extends "base.html" %}
{% block title %}Register — Phase 2{% endblock %}

{% block content %}
<h1>Create account</h1>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="post" action="/register">
  <label for="username">Username</label>
  <input id="username" name="username" type="text"
         placeholder="Choose a username" required autofocus autocomplete="username">

  <label for="password">Password</label>
  <input id="password" name="password" type="password"
         placeholder="Choose a password" required autocomplete="new-password">

  <button class="btn" type="submit">Register</button>
</form>

<a class="link" href="/login">Already have an account? Sign in</a>
{% endblock %}
