<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Phase 2 — 2FA{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 440px;
    }

    h1 {
      font-size: 1.45rem;
      font-weight: 600;
      color: #111827;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 0.3rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111827;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 1.1rem;
    }
    input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }

    .btn {
      display: block;
      width: 100%;
      padding: 0.7rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.15s;
      margin-top: 0.25rem;
    }
    .btn:hover { background: #4f46e5; }

    .error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #dc2626;
      border-radius: 8px;
      padding: 0.65rem 0.85rem;
      font-size: 0.875rem;
      margin-bottom: 1.1rem;
      line-height: 1.5;
    }

    .info {
      background: #eff6ff;
      border: 1px solid #93c5fd;
      color: #1d4ed8;
      border-radius: 8px;
      padding: 0.65rem 0.85rem;
      font-size: 0.875rem;
      margin-bottom: 1.1rem;
      line-height: 1.6;
    }

    .warn {
      background: #fffbeb;
      border: 1px solid #fcd34d;
      color: #92400e;
      border-radius: 8px;
      padding: 0.65rem 0.85rem;
      font-size: 0.875rem;
      margin-bottom: 1.1rem;
      line-height: 1.5;
    }

    .link {
      display: block;
      text-align: center;
      margin-top: 1.1rem;
      font-size: 0.875rem;
      color: #6366f1;
      text-decoration: none;
    }
    .link:hover { text-decoration: underline; }

    .secret-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 1rem 1.2rem;
      font-family: "Courier New", Courier, monospace;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      text-align: center;
      word-break: break-all;
      color: #1f2937;
      margin: 0.75rem 0 1rem;
      user-select: all;
    }

    .center { text-align: center; }
    .muted  { color: #6b7280; font-size: 0.9rem; margin-top: 0.5rem; }
    .big-icon { font-size: 3rem; margin-bottom: 0.75rem; }
  </style>
</head>
<body>
  <div class="card">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
